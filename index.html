<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tablet POS</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:10px;
    background:#f5f5f5;
}
button{
    padding:10px;
    margin:5px;
    font-size:16px;
}
.order{
    background:white;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border-left:5px solid #007bff;
}
.paid{
    border-left-color:green;
    background:#eafbea;
}
.served{
    background:#fff3cd;
}
.item{
    display:flex;
    justify-content:space-between;
    margin:4px 0;
}
</style>
</head>

<body>

<h2>Tablet POS</h2>

<button onclick="newOrder()">New Order</button>
<button onclick="exportCSV()">Export Sales</button>

<div id="orders"></div>

<script>

const menu = {
    "Rice Meals":[
        {name:"Chicken Meal",price:150},
        {name:"Pork BBQ Meal",price:130},
        {name:"Burger Steak",price:120}
    ],

    "Snacks":[
        {name:"Fries",price:60},
        {name:"Hotdog",price:80},
        {name:"Burger",price:120}
    ],

    "Drinks":[
        {name:"Coke",price:40},
        {name:"Sprite",price:40},
        {name:"Iced Tea",price:50}
    ]
};

let orders = JSON.parse(localStorage.getItem("orders") || "[]");


function newOrder(){
    orders.push({
        id:Date.now(),
        items:[],
        paid:false
    });
    saveOrders();
    render();
}


function toggleServed(orderId,itemIndex){
    const order=orders.find(o=>o.id===orderId);
    order.items[itemIndex].served=!order.items[itemIndex].served;
    saveOrders();
    render();
}

function markPaid(orderId){
    const order=orders.find(o=>o.id===orderId);
    order.paid=true;
    saveOrders();
    render();
}

function saveOrders(){
    localStorage.setItem("orders",JSON.stringify(orders));
}

function exportCSV(){

    let csv="Customer,Item,Price\n";

    orders.forEach((order,index)=>{

        order.items.forEach(item=>{

            csv += `${index+1},${item.name},${item.price}\n`;

        });

    });

    let blob=new Blob([csv],{type:"text/csv"});
    let a=document.createElement("a");

    a.href=URL.createObjectURL(blob);
    a.download="sales.csv";
    a.click();
}

function computeChange(orderId, total){

    const cashInput = document.getElementById('cash' + orderId);
    const changeBox = document.getElementById('change' + orderId);

    let cash = parseFloat(cashInput.value) || 0;

    let change = cash - total;

    changeBox.innerHTML = `
        <strong>Change:</strong> ₱${Math.max(0, change)}
    `;
}

function selectItem(orderId,value){

    if(!value) return;

    let [category,index]=value.split("|");

    let item=menu[category][index];

    let order=orders.find(o=>o.id===orderId);

    order.items.push({
        name:item.name,
        price:item.price,
        served:false
    });

    saveOrders();
    render();
}

saveOrders();

function render(){

    const container=document.getElementById("orders");
    container.innerHTML="";

    orders.forEach((order,idx)=>{

        let total=order.items.reduce((a,b)=>a+b.price,0);

        let div=document.createElement("div");
        div.className="order";

        if(order.paid){
            div.classList.add("paid");
        }

        div.innerHTML=`
            <h3>Customer ${idx+1}</h3>

            <div>
Items Ordered:
<ul>
${order.items.map(item=>
`<li>${item.name} - ₱${item.price}</li>`
).join("")}
</ul>
</div>

            <strong>Add Item:</strong><br>
           <select onchange="selectItem(${order.id},this.value)">
<option value="">Select Item</option>

${Object.keys(menu).map(category=>`

<optgroup label="${category}">

${menu[category].map((item,index)=>

`<option value="${category}|${index}">
${item.name} - ₱${item.price}
</option>`

).join("")}

</optgroup>

`).join("")}

</select>



         

            <h4>Total: ₱${total}</h4>

            Amount Given:
            <input type="number" id="cash${order.id}" value="0">

            <button onclick="let cash=parseFloat(document.getElementById('cash${order.id}').value)||0;
                document.getElementById('change${order.id}')
                .innerHTML='Change: ₱'+Math.max(0, cash-total);

            ">
            
            <button onclick="computeChange(${order.id}, ${total})">
    Compute Change
</button>

<div id="change${order.id}"></div>


            <div id="change${order.id}"></div>

            <button onclick="markPaid(${order.id})">
                Mark Paid
            </button>
        `;

        container.appendChild(div);
    });
}

</script>

</body>
</html>
