<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tablet POS</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:10px;
    background:#f5f5f5;
}
button{
    padding:10px;
    margin:5px;
    font-size:16px;
}
.order{
    background:white;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border-left:5px solid #007bff;
}
.paid{
    border-left-color:green;
    background:#eafbea;
}
.served{
    background:#fff3cd;
}
.item{
    display:flex;
    justify-content:space-between;
    margin:4px 0;
}
</style>
</head>

<body>

<h2>Tablet POS</h2>

<button onclick="newOrder()">New Order</button>

<div id="orders"></div>

<script>

const menu = [
    {name:"Burger",price:120},
    {name:"Fries",price:60},
    {name:"Hotdog",price:80},
    {name:"Chicken",price:150},
    {name:"Coke",price:40}
];

let orders=[];

function newOrder(){
    orders.push({
        id:Date.now(),
        items:[],
        paid:false
    });
    render();
}

function addItem(orderId,index){
    const order=orders.find(o=>o.id===orderId);
    order.items.push({
        name:menu[index].name,
        price:menu[index].price,
        served:false
    });
    render();
}

function toggleServed(orderId,itemIndex){
    const order=orders.find(o=>o.id===orderId);
    order.items[itemIndex].served=!order.items[itemIndex].served;
    render();
}

function markPaid(orderId){
    const order=orders.find(o=>o.id===orderId);
    order.paid=true;
    render();
}

function render(){

    const container=document.getElementById("orders");
    container.innerHTML="";

    orders.forEach((order,idx)=>{

        let total=order.items.reduce((a,b)=>a+b.price,0);

        let div=document.createElement("div");
        div.className="order";

        if(order.paid){
            div.classList.add("paid");
        }

        div.innerHTML=`
            <h3>Customer ${idx+1}</h3>

            <strong>Add Item:</strong><br>
            ${menu.map((m,i)=>
            `<button onclick="addItem(${order.id},${i})">
                ${m.name} ₱${m.price}
            </button>`).join("")}

            <hr>

            ${order.items.map((item,i)=>`
                <div class="item ${item.served?'served':''}">
                    <span>
                        ${item.name} - ₱${item.price}
                    </span>
                    <button onclick="toggleServed(${order.id},${i})">
                        ${item.served?'Served ✓':'Serve'}
                    </button>
                </div>
            `).join("")}

            <hr>

            <h4>Total: ₱${total}</h4>

            Amount Given:
            <input type="number" id="cash${order.id}" value="0">

            <button onclick="
                let cash=parseFloat(document.getElementById('cash${order.id}').value)||0;
                alert('Change: ₱'+(cash-total));
            ">
            Compute Change
            </button>

            <button onclick="markPaid(${order.id})">
                Mark Paid
            </button>
        `;

        container.appendChild(div);
    });
}

</script>

</body>
</html>
