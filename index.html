<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tablet POS</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:10px;
    background:#f5f5f5;
}
button{
    padding:10px;
    margin:5px;
    font-size:16px;
}
.toolbar{
    position:sticky;
    top:0;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
    background:#f5f5f5;
    padding:10px 0;
    z-index:1000;
}

.toolbar button{
    flex:1;
    min-width:120px;
    font-size:16px;
    font-weight:bold;
}

.toolbar button:last-child{
    background:#dc3545;
    color:white;
}


.order{
    background:white;
    padding:10px;
    margin-bottom:10px;

    border:5px solid #080c68; /* bagong border */
    border-radius:10px;

    box-shadow:0 2px 6px rgba(0,0,0,0.08);

    border-left:5px solid #007bff;
}

 .paid{
    border:2px solid #28a745;
    border-left:6px solid #28a745;
    background:#eafbea;
}
.served{
    background:#fff3cd;
}
.item{
    display:flex;
    justify-content:space-between;
    margin:4px 0;
}
.remove-btn{
    background:#dc3545;
    color:white;
    border:none;
}
input[type=text] {
  width: 30%;
  padding: 12px;
  margin: 10px 0;
  box-sizing: border-box;
}
.serve-btn{
    background:#6878f2;
    color:rgb(255, 255, 255);
    border:none;
}

select{
    padding:8px;
    margin-left:5px;
}

.cash-area{
    display:flex;
    gap:6px;
    align-items:center;
    flex-wrap:wrap;
}

.cash-area input{
    width:120px;
}



</style>
</head>

<body>

<h2>Tablet POS</h2>

<div class="toolbar">
    <button onclick="newOrder()">➕ New Order</button>
    <button onclick="exportCSV()">📊 Sales</button>
    <button onclick="exportAuditReport()">📝 Audit</button>
    <button onclick="clearAllOrders()">🗑 Clear All</button>
</div>

<div id="orders"></div>

<script>

const menu = {
    "Rice Meals":[
        {name:"Sisig w/ Egg & Rice",price:75},
        {name:"Sizzling Meals Half Rice",price:65},
        {name:"Sizzling Meals Whole Rice",price:75}
        {name:"Tapa w/ Egg & Rice",price:75}
        {name:"Tocino w/ Egg & Rice",price:75}
        {name:"Bacon w/ Egg & Rice",price:75}
        {name:"Cordon Bleu w/ Rice",price:75}
        {name:"Chickenn Fillet w/ Rice",price:75}
        {name:"Liemppo w/ Rice",price:75}
        {name:"BBQ w/ Rice",price:75}
        {name:"Chicken Katsu w/ Rice",price:75}
        {name:"Hotdog w/ Rice,price:45}
        {name:"Siomai w/ Rice",price:45}
        {name:"Fried Siomai w/ Rice",price:50}
        {name:"Egg w/ Rice",price:35}
        {name:"Hotdog & Egg w/ Rice",price:60}
        {name:"Rice in Cup/Plate",price:20}
        {name:"Sizzling Meals No Rice or No Egg",price:65}
        {name:"Fried Egg Only",price:15}
        {name:"Fried Hotdog TJ Only",price:25}
        

    "Snacks":[
        {name:"Regular Burger",price:25},
        {name:"Egg Sandwich",price:30},
        {name:"Hotdog Sandwich",price:35}
    ],{name:"Davids Siomai",price:30}
{name:"Fried Siomai",price:35}
{name:"Davids Siopao Big",price:30}
{name:"Fries Small",price:35}
{name:"Fries Medium",price:65}
{name:"Fries Large",price:95}
{name:"Fries & Drinks",price:55}
{name:"Fries w/ Drinks & Hotdog",price:70}
{name:"Fries w/ Drinks & Siomai",price:70}
{name:"Fries w/ Drinks & Nuggets",price:70}


{name:"Fries & Drinks",price:55}
{name:"Hotdog Sandwich",price:35}


     "BIscuits and Chocolates":[
        {name:"Fries",price:60},
        {name:"Hotdog",price:80},
        {name:"Burger",price:120}
    ],

    "Drinks":[
        {name:"Coke",price:40},
        {name:"Sprite",price:40},
        {name:"Iced Tea",price:50}
    ]
};

let orders = JSON.parse(localStorage.getItem("orders") || "[]");

let transactionLog = JSON.parse(
    localStorage.getItem("transactionLog") || "[]"
);

function saveTransactionLog(){
    localStorage.setItem(
        "transactionLog",
        JSON.stringify(transactionLog)
    );
}


function newOrder(){
    orders.push({
    id:Date.now(),
    customerName:"",
    items:[],
    paid:false
});
    saveOrders();
    render();
}


function toggleServed(orderId,itemIndex){
    const order=orders.find(o=>o.id===orderId);
    order.items[itemIndex].served=!order.items[itemIndex].served;
    saveOrders();
    render();
}

function removeItem(orderId,itemIndex){

    const order = orders.find(o => o.id === orderId);

    const removedItem = order.items[itemIndex];

    transactionLog.push({
        orderId: order.id,
        action: "REMOVE_ITEM",
        item: removedItem.name,
        price: removedItem.price,
        timestamp: new Date().toISOString()
    });

    order.items.splice(itemIndex,1);

    saveOrders();
    saveTransactionLog();
    render();
}

function markPaid(orderId){

    const order = orders.find(o => o.id === orderId);

    order.paid = !order.paid;

    transactionLog.push({
        orderId: order.id,
        action: order.paid ? "PAID" : "UNDO_PAID",
        timestamp: new Date().toISOString(),
        total: order.items.reduce((a,b)=>a+b.price,0)
    });

    saveOrders();
    saveTransactionLog();
    render();
}

function saveOrders(){
    localStorage.setItem("orders",JSON.stringify(orders));
}

function exportCSV(){

    let csv="Customer,Item,Price\n";

    orders.forEach((order,index)=>{

        order.items.forEach(item=>{

            csv += `${index+1},${item.name},${item.price}\n`;

        });

    });

    let blob=new Blob([csv],{type:"text/csv"});
    let a=document.createElement("a");

    a.href=URL.createObjectURL(blob);
    a.download="sales.csv";
    a.click();
}

function exportAuditReport(){
    

    let csv =
    "Date,Order ID,Action,Item,Price,Total\n";

    transactionLog.forEach(log => {

        csv +=
        `${log.timestamp},` +
        `${log.orderId},` +
        `${log.action},` +
        `${log.item || ""},` +
        `${log.price || ""},` +
        `${log.total || ""}\n`;

    });

    let blob = new Blob([csv],{
        type:"text/csv"
    });

    let a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "audit_report.csv";
    a.click();
}

function clearAllOrders(){

    if(!confirm("Clear all orders?")){
        return;
    }

    exportAuditReport();

    localStorage.setItem(
        "audit_" + Date.now(),
        JSON.stringify(transactionLog)
    );

    orders.length = 0;
    transactionLog.length = 0;

    saveOrders();
    saveTransactionLog();

    render();

    alert("All orders cleared.");
}

function computeChange(orderId,total){

    const cashInput =
        document.getElementById(
            "cash"+orderId
        );

    const changeBox =
        document.getElementById(
            "change"+orderId
        );

    let cash =
        Number(cashInput.value);

    if(isNaN(cash) || cash <= 0){
        changeBox.innerHTML =
            "<strong>Enter valid cash</strong>";
        return;
    }

    let change =
        cash-total;

    changeBox.innerHTML =
        `
        <strong>
        Change:
        ₱${change.toFixed(2)}
        </strong>
        `;
}

function selectItem(orderId,value){

    if(!value) return;

    let [category,index]=value.split("|");

    let item=menu[category][index];

    let order=orders.find(o=>o.id===orderId);

    order.items.push({
        name:item.name,
        price:item.price,
        served:false
    });

    saveOrders();
    render();
}

function updateCustomerName(orderId, value){

    const order = orders.find(o => o.id === orderId);

    order.customerName = value;

    saveOrders();
}

saveOrders();

function saveCustomerName(orderId){

    const input =
        document.getElementById(
            "customer" + orderId
        );

    const order =
        orders.find(
            o => o.id === orderId
        );

    if(!order) return;

    order.customerName =
        input.value.trim();

    saveOrders();

    render();


}

function setCashOption(orderId, value){

    if(!value) return;

    document.getElementById(
        "cash"+orderId
    ).value = value;

}

function setCashOption(orderId, value){

    if(!value) return;

    const input =
        document.getElementById(
            "cash"+orderId
        );

    input.value = value;

    input.focus();

}

function render(){

    const container=document.getElementById("orders");
    container.innerHTML="";

    orders.forEach((order,idx)=>{

        let total=order.items.reduce((a,b)=>a+b.price,0);

        let div=document.createElement("div");
        div.className="order";

        if(order.paid){
            div.classList.add("paid");
        }

        div.innerHTML=`
       <h3>
    ${order.customerName?.trim()
        ? `${order.customerName} (Order #${order.id})`
        : `Order #${order.id}`
    }
</h3>

<input
    type="text"
    id="customer${order.id}"
    placeholder="Customer Name (Optional)"
    value="${order.customerName || ''}"
>

<button onclick="saveCustomerName(${order.id})">
    Save Name
</button>

<br><br>

            <strong>Add Item:</strong><br><br>

            <select onchange="selectItem(${order.id},this.value)">
                <option value="">Select Item</option>

                ${Object.keys(menu).map(category=>
                    `
                    <optgroup label="${category}">
                        ${menu[category].map((item,index)=>
                            `<option value="${category}|${index}">
                                ${item.name} - ₱${item.price}
                            </option>`
                        ).join("")}
                    </optgroup>
                    `
                ).join("")}
            </select>

              <hr>

         ${order.items.map((item,i)=>`
    <div class="item ${item.served?'served':''}">
        <span>${item.name} - ₱${item.price}</span>

        <div>

            <button class="serve-btn" onclick="toggleServed(${order.id},${i})">
                ${item.served ? 'Served ✓' : 'Serve'}
            </button>

            <button class="remove-btn"
        onclick="removeItem(${order.id},${i})">
    Remove
</button>
        </div>
    </div>
`).join("")}

            <hr>

            <h4>Total: ₱${total}</h4>



     <div class="cash-area">

<input
    type="number"
    id="cash${order.id}"
    placeholder="Enter Custom Amount"
>

<select
    onchange="setCashOption(${order.id}, this.value)"
>
    <option value="">
        Cash Options
    </option>

    <option value="${total}">
        Exact Amount
    </option>

    <option value="100">₱100</option>
    <option value="200">₱200</option>
    <option value="500">₱500</option>
    <option value="1000">₱1000</option>
    <option value="2000">₱2000</option>

</select>

<button
onclick="
computeChange(
${order.id},
${total}
)">
Compute Change
</button>

</div>

<div id="change${order.id}"></div>

            <button onclick="markPaid(${order.id})">
    ${order.paid ? 'Undo Paid' : 'Mark Paid'}
</button>
        `;

        container.appendChild(div);
    });
}

</script>

</body>
</html>
