<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tablet POS</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:10px;
    background:#f5f5f5;
}
button{
    padding:10px;
    margin:5px;
    font-size:16px;
}
.toolbar{
    position:sticky;
    top:0;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
    background:#f5f5f5;
    padding:10px 0;
    z-index:1000;
}

.toolbar button{
    flex:1;
    min-width:120px;
    font-size:16px;
    font-weight:bold;
}

.toolbar button:last-child{
    background:#dc3545;
    color:white;
}
.order{
    background:white;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border-left:5px solid #007bff;
}
.paid{
    border-left-color:green;
    background:#eafbea;
}
.served{
    background:#fff3cd;
}
.item{
    display:flex;
    justify-content:space-between;
    margin:4px 0;
}
.remove-btn{
    background:#dc3545;
    color:white;
    border:none;
}
input[type=text] {
  width: 30%;
  padding: 12px;
  margin: 10px 0;
  box-sizing: border-box;
}

</style>
</head>

<body>

<h2>Tablet POS</h2>

<div class="toolbar">
    <button onclick="newOrder()">➕ New Order</button>
    <button onclick="exportCSV()">📊 Sales</button>
    <button onclick="exportAuditReport()">📝 Audit</button>
    <button onclick="clearAllOrders()">🗑 Clear All</button>
</div>

<div id="orders"></div>

<script>

const menu = {
    "Rice Meals":[
        {name:"Chicken Meal",price:150},
        {name:"Pork BBQ Meal",price:130},
        {name:"Burger Steak",price:120}
    ],

    "Snacks":[
        {name:"Fries",price:60},
        {name:"Hotdog",price:80},
        {name:"Burger",price:120}
    ],

    "Drinks":[
        {name:"Coke",price:40},
        {name:"Sprite",price:40},
        {name:"Iced Tea",price:50}
    ]
};

let orders = JSON.parse(localStorage.getItem("orders") || "[]");

let transactionLog = JSON.parse(
    localStorage.getItem("transactionLog") || "[]"
);

function saveTransactionLog(){
    localStorage.setItem(
        "transactionLog",
        JSON.stringify(transactionLog)
    );
}


function newOrder(){
    orders.push({
    id:Date.now(),
    customerName:"",
    items:[],
    paid:false
});
    saveOrders();
    render();
}


function toggleServed(orderId,itemIndex){
    const order=orders.find(o=>o.id===orderId);
    order.items[itemIndex].served=!order.items[itemIndex].served;
    saveOrders();
    render();
}

function removeItem(orderId,itemIndex){

    const order = orders.find(o => o.id === orderId);

    const removedItem = order.items[itemIndex];

    transactionLog.push({
        orderId: order.id,
        action: "REMOVE_ITEM",
        item: removedItem.name,
        price: removedItem.price,
        timestamp: new Date().toISOString()
    });

    order.items.splice(itemIndex,1);

    saveOrders();
    saveTransactionLog();
    render();
}

function markPaid(orderId){

    const order = orders.find(o => o.id === orderId);

    order.paid = !order.paid;

    transactionLog.push({
        orderId: order.id,
        action: order.paid ? "PAID" : "UNDO_PAID",
        timestamp: new Date().toISOString(),
        total: order.items.reduce((a,b)=>a+b.price,0)
    });

    saveOrders();
    saveTransactionLog();
    render();
}

function saveOrders(){
    localStorage.setItem("orders",JSON.stringify(orders));
}

function exportCSV(){

    let csv="Customer,Item,Price\n";

    orders.forEach((order,index)=>{

        order.items.forEach(item=>{

            csv += `${index+1},${item.name},${item.price}\n`;

        });

    });

    let blob=new Blob([csv],{type:"text/csv"});
    let a=document.createElement("a");

    a.href=URL.createObjectURL(blob);
    a.download="sales.csv";
    a.click();
}

function exportAuditReport(){
    

    let csv =
    "Date,Order ID,Action,Item,Price,Total\n";

    transactionLog.forEach(log => {

        csv +=
        `${log.timestamp},` +
        `${log.orderId},` +
        `${log.action},` +
        `${log.item || ""},` +
        `${log.price || ""},` +
        `${log.total || ""}\n`;

    });

    let blob = new Blob([csv],{
        type:"text/csv"
    });

    let a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "audit_report.csv";
    a.click();
}

function clearAllOrders(){

    if(!confirm("Clear all orders?")){
        return;
    }

    exportAuditReport();

    localStorage.setItem(
        "audit_" + Date.now(),
        JSON.stringify(transactionLog)
    );

    orders.length = 0;
    transactionLog.length = 0;

    saveOrders();
    saveTransactionLog();

    render();

    alert("All orders cleared.");
}

function computeChange(orderId,total){

    const cashInput =
        document.getElementById(
            "cash"+orderId
        );

    const changeBox =
        document.getElementById(
            "change"+orderId
        );

    let cash =
        Number(cashInput.value);

    if(isNaN(cash) || cash <= 0){
        changeBox.innerHTML =
            "<strong>Enter valid cash</strong>";
        return;
    }

    let change =
        cash-total;

    changeBox.innerHTML =
        `
        <strong>
        Change:
        ₱${change.toFixed(2)}
        </strong>
        `;
}

function selectItem(orderId,value){

    if(!value) return;

    let [category,index]=value.split("|");

    let item=menu[category][index];

    let order=orders.find(o=>o.id===orderId);

    order.items.push({
        name:item.name,
        price:item.price,
        served:false
    });

    saveOrders();
    render();
}

function updateCustomerName(orderId, value){

    const order = orders.find(o => o.id === orderId);

    order.customerName = value;

    saveOrders();
}

saveOrders();

function saveCustomerName(orderId){

    const input =
        document.getElementById(
            "customer" + orderId
        );

    const order =
        orders.find(
            o => o.id === orderId
        );

    if(!order) return;

    order.customerName =
        input.value.trim();

    saveOrders();

    render();


}

function render(){

    const container=document.getElementById("orders");
    container.innerHTML="";

    orders.forEach((order,idx)=>{

        let total=order.items.reduce((a,b)=>a+b.price,0);

        let div=document.createElement("div");
        div.className="order";

        if(order.paid){
            div.classList.add("paid");
        }

        div.innerHTML=`
       <h3>
    ${order.customerName?.trim()
        ? `${order.customerName} (Order #${order.id})`
        : `Order #${order.id}`
    }
</h3>

<input
    type="text"
    id="customer${order.id}"
    placeholder="Customer Name (Optional)"
    value="${order.customerName || ''}"
>

<button onclick="saveCustomerName(${order.id})">
    Save Name
</button>

<br><br>

            <strong>Add Item:</strong><br><br>

            <select onchange="selectItem(${order.id},this.value)">
                <option value="">Select Item</option>

                ${Object.keys(menu).map(category=>
                    `
                    <optgroup label="${category}">
                        ${menu[category].map((item,index)=>
                            `<option value="${category}|${index}">
                                ${item.name} - ₱${item.price}
                            </option>`
                        ).join("")}
                    </optgroup>
                    `
                ).join("")}
            </select>

              <hr>

         ${order.items.map((item,i)=>`
    <div class="item ${item.served?'served':''}">
        <span>${item.name} - ₱${item.price}</span>

        <div>
            <button onclick="toggleServed(${order.id},${i})">
                ${item.served ? 'Served ✓' : 'Serve'}
            </button>

            <button class="remove-btn"
        onclick="removeItem(${order.id},${i})">
    Remove
</button>
        </div>
    </div>
`).join("")}

            <hr>

            <h4>Total: ₱${total}</h4>

            <input type="number" id="cash${order.id}" value="0">
            

            <button onclick="computeChange(${order.id}, ${total})">
                Compute Change
            </button>

            <div id="change${order.id}"></div>

          

            <button onclick="markPaid(${order.id})">
    ${order.paid ? 'Undo Paid' : 'Mark Paid'}
</button>
        `;

        container.appendChild(div);
    });
}

</script>

</body>
</html>
